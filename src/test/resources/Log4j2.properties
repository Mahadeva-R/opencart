rootLogger.level=INFO

#logging to a console
appender.console.type= console
appender.console.name= OpenCartSeleniumProject
appender.console.layout.type= PatternLayout
appender.console.layout.pattern=[%d{yyyy-MM-dd HH:mm:ss}] %-5p %M: - %m%n
rootLogger.appenderRef.stdout.ref= OpenCartSeleniumProject

#logging to a file
appender.file.type= File
appender.file.name= LogOpenCartSeleniumProject
appender.file.filename= ./logReport/openCartSeleniumProject.log
appender.file.layout.type= PatternLayout
appender.file.layout.pattern=%-5p %d{yyyy-MMM-dd HH:mm:ss}  %M : - %m%n
rootLogger.appenderRef.file.ref= LogOpenCartSeleniumProject